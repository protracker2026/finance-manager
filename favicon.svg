<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E2C"/>
      <stop offset="100%" stop-color="#12121A"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="coinGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="5" stdDeviation="15" flood-color="#F59E0B" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- App Background Shape -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bgGrad)" filter="url(#shadow)"/>
  
  <!-- Subtle border for glass effect -->
  <rect x="34" y="34" width="444" height="444" rx="98" fill="transparent" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>

  <!-- Bar Chart -->
  <!-- Bar 1 -->
  <rect x="140" y="270" width="48" height="120" rx="16" fill="#374151"/>
  <!-- Bar 2 -->
  <rect x="232" y="190" width="48" height="200" rx="16" fill="#4B5563"/>
  <!-- Bar 3 (Highlight) -->
  <rect x="324" y="120" width="48" height="270" rx="16" fill="url(#chartGrad)" filter="url(#shadow)"/>

  <!-- Floating Coin -->
  <!-- Translate it slightly left and up -->
  <g transform="translate(196, 160)" filter="url(#coinGlow)">
    <circle cx="0" cy="0" r="70" fill="url(#coinGrad)"/>
    <!-- Inner coin ring -->
    <circle cx="0" cy="0" r="56" fill="transparent" stroke="#FFF7ED" stroke-width="4" stroke-opacity="0.4"/>
    <!-- Coin text -->
    <text x="0" y="22" font-family="'Inter', -apple-system, sans-serif" font-weight="900" font-size="70" text-anchor="middle" fill="#78350F">$</text>
  </g>
</svg>
