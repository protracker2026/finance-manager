<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>จัดการการเงิน & หนี้สิน</title>
  <meta name="description" content="แอพจัดการรายรับ-รายจ่าย และหนี้สิน พร้อมคำนวณดอกเบี้ยลดต้นลดดอก และเดินรายวัน">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="apple-touch-icon" href="./favicon.svg">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#12121A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Finance">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&family=Space+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Courier+Prime:wght@400;700&display=swap"
    rel="stylesheet">

  <!-- Libraries (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://npmcdn.com/flatpickr/dist/l10n/th.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="./src/styles/variables.css">
  <link rel="stylesheet" href="./src/styles/base.css">
  <link rel="stylesheet" href="./src/styles/components.css">
  <link rel="stylesheet" href="./src/styles/receipt.css">
  <link rel="stylesheet" href="./src/styles/login.css">
</head>

<body>
  <div class="app-layout">
    <!-- Login Container -->
    <div id="login-container" style="display: none;"></div>

    <!-- Sidebar Open Button (Visible when sidebar is collapsed) -->
    <button id="sidebar-toggle-open" class="sidebar-toggle-open-btn" aria-label="Open Sidebar" title="แสดงแถบเมนู" style="display: none;">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <button id="sidebar-toggle-close" class="sidebar-toggle-close-btn" aria-label="Close Sidebar" title="ซ่อนแถบเมนู">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>

      <div class="sidebar-logo">
        <h1>
          <span class="logo-icon">💰</span>
          Finance Manager
        </h1>
        <p class="subtitle">จัดการการเงิน & หนี้สิน</p>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-route="dashboard">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
          </svg>
          แดชบอร์ด
        </button>
        <button class="nav-item" data-route="transactions">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2v20" />
            <path d="M9 5h6a3.5 3.5 0 0 1 0 7H9" />
            <path d="M9 12h7a3.5 3.5 0 0 1 0 7H9" />
          </svg>
          รายรับ - รายจ่าย
        </button>
        <button class="nav-item" data-route="debts">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="4" width="22" height="16" rx="2" ry="2" />
            <line x1="1" y1="10" x2="23" y2="10" />
          </svg>
          จัดการหนี้สิน
        </button>
        <button class="nav-item" data-route="settings">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          บัญชีผู้ใช้
        </button>
      </nav>
    </aside>

    <!-- Bottom Navigation (Mobile) -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-route="dashboard">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" />
          <rect x="14" y="3" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" />
          <rect x="3" y="14" width="7" height="7" />
        </svg>
        <span>หน้าหลัก</span>
      </button>
      <button class="nav-item" data-route="transactions">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2v20" />
          <path d="M9 5h6a3.5 3.5 0 0 1 0 7H9" />
          <path d="M9 12h7a3.5 3.5 0 0 1 0 7H9" />
        </svg>
        <span>ธุรกรรม</span>
      </button>
      <button class="nav-item" data-route="debts">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="4" width="22" height="16" rx="2" ry="2" />
          <line x1="1" y1="10" x2="23" y2="10" />
        </svg>
        <span>หนี้สิน</span>
      </button>
      <button class="nav-item" data-route="settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        <span>บัญชี</span>
      </button>
    </nav>

    <!-- Main Content -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.js"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/th.js"></script>
    <main class="main-content">
      <div id="app">
        <div class="loading-spinner"></div>
      </div>
    </main>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Receipt Popup -->
  <div id="receiptPopup" class="receipt-popup">
    <div class="receipt-content">
      <div class="receipt-header">
        <div class="receipt-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <div class="receipt-title">บันทึกสำเร็จ</div>
        <div class="receipt-date" id="receiptDate"></div>
      </div>
      <div class="receipt-body">
        <div class="receipt-row">
          <span>รายการ</span>
          <span id="receiptCategory"></span>
        </div>
        <div class="receipt-divider"></div>
        <div class="receipt-total">
          <span>ยอดรวม</span>
          <span id="receiptAmount"></span>
        </div>
      </div>
      <button class="receipt-close"
        onclick="document.getElementById('receiptPopup').classList.remove('active')">ปิด</button>
    </div>
  </div>

  <!-- App Script -->
  <script type="module" src="./src/main.js?v=5"></script>
</body>

</html>
